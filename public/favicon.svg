<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="wood" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0" stop-color="#8a5526"/><stop offset="0.5" stop-color="#643f1d"/><stop offset="1" stop-color="#3f2611"/>
    </linearGradient>
    <linearGradient id="roof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7a4a22"/><stop offset="1" stop-color="#48290f"/>
    </linearGradient>
    <radialGradient id="face" cx="50%" cy="42%" r="62%">
      <stop offset="0" stop-color="#fbf3df"/><stop offset="0.82" stop-color="#f1e3c2"/><stop offset="1" stop-color="#e3d0a4"/>
    </radialGradient>
    <linearGradient id="brass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e7cd72"/><stop offset="0.5" stop-color="#caa53d"/><stop offset="1" stop-color="#8a6a1c"/>
    </linearGradient>
  </defs>

  <!-- background (full-bleed: maskable safe) -->
  <rect width="512" height="512" rx="104" fill="url(#wood)"/>
  <rect width="512" height="512" rx="104" fill="#000" opacity="0.05"/>

  <!-- roof -->
  <path d="M96 188 L256 86 L416 188 Z" fill="url(#roof)" stroke="#2a1809" stroke-width="7"/>
  <path d="M84 188 H428 L414 210 H98 Z" fill="#3c2410" stroke="#2a1809" stroke-width="5"/>

  <!-- cuckoo door + peeking bird -->
  <path d="M214 168 q42 -34 84 0 v28 a8 8 0 0 1 -8 8 h-68 a8 8 0 0 1 -8 -8 z" fill="#140b04"/>
  <g>
    <ellipse cx="252" cy="184" rx="24" ry="19" fill="#c2854a"/>
    <circle cx="270" cy="174" r="13" fill="#d29a5c"/>
    <path d="M281 173 l20 5 l-20 6 Z" fill="#e0892a"/>
    <circle cx="273" cy="171" r="3" fill="#1a0f06"/>
    <path d="M230 184 q-18 6 -24 -4 q15 1 24 -7Z" fill="#a96c34"/>
  </g>

  <!-- clock face -->
  <circle cx="256" cy="338" r="150" fill="url(#brass)" stroke="#7a5a14" stroke-width="4"/>
  <circle cx="256" cy="338" r="134" fill="url(#face)" stroke="#cdb48a" stroke-width="3"/>
  <!-- 12/3/6/9 ticks -->
  <g fill="#9a7838">
    <rect x="250" y="218" width="12" height="22" rx="5"/>
    <rect x="250" y="436" width="12" height="22" rx="5"/>
    <rect x="354" y="332" width="22" height="12" rx="5"/>
    <rect x="136" y="332" width="22" height="12" rx="5"/>
  </g>
  <!-- hands ~10:10 -->
  <g stroke="#2a1a0c" stroke-linecap="round">
    <line x1="256" y1="338" x2="200" y2="288" stroke-width="15"/>
    <line x1="256" y1="338" x2="330" y2="278" stroke-width="11"/>
  </g>
  <circle cx="256" cy="338" r="12" fill="#2a1a0c"/>
  <circle cx="256" cy="338" r="5" fill="#caa53d"/>
</svg>
